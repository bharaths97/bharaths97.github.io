<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Prep</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080b14;
    color: #c8d0e8;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding: 48px 24px;
  }

  .wrap { max-width: 680px; margin: 0 auto; }

  .page-eyebrow {
    font-family: monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #5a6485;
    margin-bottom: 10px;
  }

  .page-title {
    font-size: 26px;
    font-weight: 700;
    color: #f0f0f8;
    letter-spacing: -0.02em;
    margin-bottom: 40px;
  }

  .company {
    border: 1px solid #1e2538;
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .company.open { border-color: #2e3a55; }

  .company-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    cursor: pointer;
    background: #0e1220;
    user-select: none;
  }

  .company-header:hover { background: #111827; }

  .company-meta { flex: 1; }

  .company-name {
    font-size: 15px;
    font-weight: 600;
    color: #e8e8f8;
  }

  .company-role {
    font-family: monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #5a6485;
    margin-top: 4px;
  }

  .company-toggle {
    font-family: monospace;
    font-size: 16px;
    color: #f7931a;
    width: 20px;
    text-align: center;
    transition: transform 0.2s;
  }

  .company.open .company-toggle { transform: rotate(45deg); }

  .doc-list-wrap {
    display: none;
    padding: 4px 22px 18px;
    background: #0a0f1c;
  }

  .company.open .doc-list-wrap { display: block; }

  .doc-list { list-style: none; margin-top: 8px; }

  .doc-list li { margin-bottom: 8px; }

  .doc-list a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #0e1220;
    border: 1px solid #1e2538;
    border-radius: 6px;
    padding: 13px 18px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s;
  }

  .doc-list a:hover { border-color: #f7931a; }

  .doc-info { flex: 1; }

  .doc-tag {
    font-family: monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #5a6485;
    margin-bottom: 4px;
  }

  .doc-title {
    font-size: 14px;
    font-weight: 600;
    color: #e8e8f8;
  }

  .doc-arrow {
    font-family: monospace;
    color: #f7931a;
    font-size: 13px;
    margin-left: 16px;
  }

  .error {
    font-family: monospace;
    font-size: 13px;
    color: #e05555;
    padding: 16px 0;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="page-eyebrow">Interview Prep</div>
  <h1 class="page-title">Companies</h1>
  <div id="company-list"></div>
</div>

<script>
function toggle(id) {
  document.getElementById(id).classList.toggle('open');
}

function render(data) {
  const list = document.getElementById('company-list');
  list.innerHTML = data.companies.map((co, i) => {
    const id = 'co-' + i;
    const docsHtml = co.docs.map(d => `
      <li>
        <a href="${d.href}">
          <div class="doc-info">
            <div class="doc-tag">${d.tag}</div>
            <div class="doc-title">${d.title}</div>
          </div>
          <span class="doc-arrow">→</span>
        </a>
      </li>`).join('');

    return `
      <div class="company open" id="${id}">
        <div class="company-header" onclick="toggle('${id}')">
          <div class="company-meta">
            <div class="company-name">${co.name}</div>
            <div class="company-role">${co.role}</div>
          </div>
          <span class="company-toggle">+</span>
        </div>
        <div class="doc-list-wrap">
          <ul class="doc-list">${docsHtml}</ul>
        </div>
      </div>`;
  }).join('');
}

fetch('./prep.json')
  .then(r => r.json())
  .then(render)
  .catch(() => {
    document.getElementById('company-list').innerHTML =
      '<p class="error">// Error: could not load prep.json</p>';
  });
</script>
</body>
</html>
